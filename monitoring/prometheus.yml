global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:8081"]
    metrics_path: /metrics

  - job_name: "oms-service"
    static_configs:
      - targets: ["oms-service:8080"]
    metrics_path: /metrics
