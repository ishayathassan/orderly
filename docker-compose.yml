services:
  # OMS Postgres
  postgres-oms:
    image: postgres:15
    container_name: postgres-oms
    environment:
      POSTGRES_USER: orderly-admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: orderly_oms
    ports:
      - "5432:5432"
    volumes:
      - pgdata-oms:/var/lib/postgresql/data
    networks:
      - orderly-network

  # Auth Postgres
  postgres-auth:
    image: postgres:15
    container_name: postgres-auth
    environment:
      POSTGRES_USER: orderly-admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: orderly_auth
    ports:
      - "5433:5432"
    volumes:
      - pgdata-auth:/var/lib/postgresql/data
    networks:
      - orderly-network

  # API Gateway
  kong:
    image: kong:3.4
    container_name: kong-gateway
    user: "0"
    env_file:
      - ./auth_service/.env
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    networks:
      - orderly-network
    ports:
      - "8000:8000" # Public API Port
      - "8001:8001" # Admin API
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml

  # OMS Service
  oms-service:
    image: oms-service:latest
    container_name: oms-service
    env_file:
      - ./oms_service/.env
    depends_on:
      - postgres-oms
    networks:
      - orderly-network

  # Auth Service
  auth-service:
    image: auth-service:latest
    container_name: auth-service
    env_file:
      - ./auth_service/.env
    depends_on:
      - postgres-auth
    networks:
      - orderly-network

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - orderly-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - orderly-network

volumes:
  pgdata-oms:
  pgdata-auth:
  grafana-data:

networks:
  orderly-network:
    driver: bridge
